apiVersion: apps/v1
kind: Deployment
metadata: 
  name: ey-cart-dp
  namespace: noel-ns
  labels:
    app: cart
spec: # define the behaviour of RS
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector: # defines how repliaset finds which to clone
    matchLabels:
      app: web
  template: # it contains pod definitions
    metadata: 
      labels:
        app: web
    spec: # container definition
      containers:
        - name: fl-container
          image: muralisocial123/flipkart-app-web:v1.1.0    
          ports:
            - containerPort: 80
  
