apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ey-route
  namespace: noel-ns
spec:
  parentRefs:
    name: noel-gateway
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      filters:
        - type: URLRewrite
          URLRewrite:
            path:
              type: ReplacePrefixMatch
              ReplacePrefixMatch: /
      backendRefs:
        - name: eycart-service
          port: 3000

---

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fitness-route
  namespace: noel-ns
spec:
  parentRefs:
    name: noel-gateway
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /fitness
      filters:
        - type: URLRewrite
          URLRewrite:
            path:
              type: ReplacePrefixMatch
              ReplacePrefixMatch: /fitness
      backendRefs:
        - name: fitness-service
          port: 5000
